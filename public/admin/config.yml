backend:
  name: github
  repo: Builttoclick/multitainer-web
  branch: main

media_folder: "public/fotos/proyectos"
public_folder: "/fotos/proyectos"

collections:
  - name: proyectos
    label: Proyectos
    label_singular: Proyecto
    folder: src/content/proyectos
    create: true
    slug: "{{slug}}"
    summary: "{{titulo}}"
    fields:
      - { name: titulo, label: Título (H1), widget: string }
      - name: categoria
        label: Categoría
        widget: select
        options:
          - { label: "Oficina", value: oficina }
          - { label: "Obrador", value: obrador }
          - { label: "Vestuario", value: vestuario }
          - { label: "Showroom", value: showroom }
          - { label: "Campamento", value: campamento }
          - { label: "Baño", value: bano }
          - { label: "Edificio dos plantas", value: dos-plantas }
      - { name: zona, label: Zona, widget: string, hint: "Ej. Mariano Roque Alonso, Asunción, Gran Asunción" }
      - { name: medida, label: Medida, widget: string, required: false, hint: "Ej. 20 pies, 40 pies, módulos unidos" }
      - { name: cliente, label: Cliente, widget: string, required: false, hint: "Ej. 4 Pets, CONMEBOL" }
      - { name: resumen, label: Resumen (texto de la tarjeta), widget: text }
      - { name: anio, label: Año, widget: number, required: false, value_type: int }
      - name: estado
        label: Estado
        widget: select
        required: false
        options: ["Terminado", "En obra"]
      - { name: destacado, label: Destacar en home, widget: boolean, default: false }
      - { name: orden, label: Orden, widget: number, default: 0, value_type: int }

      - { name: portada, label: Foto de portada, widget: image, required: false }
      - { name: portada_alt, label: Alt de la portada, widget: string, required: false }
      - name: galeria
        label: Galería
        widget: list
        required: false
        fields:
          - { name: src, label: Imagen, widget: image }
          - { name: alt, label: Texto alternativo, widget: string, required: false }

      - name: destacados
        label: Lo que lo hace (puntos destacados)
        widget: list
        required: false
        field: { name: punto, label: Punto, widget: string }
      - name: faqs
        label: Preguntas frecuentes
        widget: list
        required: false
        fields:
          - { name: pregunta, label: Pregunta, widget: string }
          - { name: respuesta, label: Respuesta, widget: text }

      - { name: metaTitle, label: "SEO · Título", widget: string, required: false }
      - { name: metaDescription, label: "SEO · Descripción", widget: text, required: false }
      - { name: body, label: Descripción larga, widget: markdown, required: false }
